<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Cuaca</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=chevron_left" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <header class="sidebar-header">
            <img src="logo.webp" alt="" class="header-logo">
            <button class="sidebar-toggle">
                <span class="material-symbols-rounded">chevron_left</span>
            </button>
        </header>

        <div class="sidebar-content">
            <form action="#" class="search-form">
                <span class="material-symbols-rounded">search</span>
                <input type="search" placeholder="search..." required>
            </form>

            <ul class="menu-list">
                <li class="menu-item">
                    <a href="#" class="menu-link active">
                        <span class="material-symbols-rounded">dashboard</span>
                        <span class="menu-label">Dashboard</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <span class="material-symbols-rounded">add_location</span>
                        <span class="menu-label">Tambah Lokasi</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <span class="material-symbols-rounded">calendar_month</span>
                        <span class="menu-label">Kalender</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle">
                <div class="theme-label">
                    <span class="theme-icon material-symbols-rounded">dark_mode</span>
                    <span class="theme-text">Dark Mode</span>
                </div>
                <div class="theme-toggle-track">
                    <div class="theme-toggle-indicator"></div>
                </div>
            </button>
        </div>
    </aside>
</body>
</html>
